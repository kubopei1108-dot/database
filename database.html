<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATABASE | BRAWL PICKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ada-black: #000000;
            --ada-white: #ffffff;
            --ada-bg-gray: #fcfcfc;
            --ada-line: #eeeeee;
        }

        body { margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif; background-color: var(--ada-white); color: var(--ada-black); }

        /* ADA風ヘッダー */
        header {
            padding: 40px 60px; border-bottom: 1px solid var(--ada-line);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(255,255,255,0.95); z-index: 1000;
        }
        .logo { font-weight: 100; letter-spacing: 0.6em; font-size: 1.2rem; text-decoration: none; color: var(--ada-black); }
        nav a { text-decoration: none; color: #999; font-size: 0.7rem; letter-spacing: 0.2em; margin-left: 30px; transition: 0.3s; }
        nav a:hover { color: var(--ada-black); }

        /* コンテンツ */
        .container { max-width: 1400px; margin: 0 auto; padding: 60px 40px; }
        .category-title { font-weight: 100; letter-spacing: 0.5em; font-size: 1.5rem; margin-bottom: 60px; text-align: center; text-transform: uppercase; }

        /* グリッドレイアウト */
        .brawler-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 60px 30px;
        }

        .brawler-item { text-decoration: none; color: inherit; transition: opacity 0.4s; }
        .brawler-item:hover { opacity: 0.5; }

        /* 製品写真風の画像エリア */
        .image-wrapper {
            background-color: var(--ada-bg-gray); aspect-ratio: 1 / 1;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; overflow: hidden;
        }
        .image-wrapper img { width: 70%; height: auto; transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .brawler-item:hover img { transform: scale(1.05); }

        /* テキスト情報 */
        .brawler-name { font-weight: 400; font-size: 0.85rem; letter-spacing: 0.2em; margin: 0 0 5px 0; text-transform: uppercase; }
        .brawler-meta { font-weight: 100; font-size: 0.6rem; color: #999; letter-spacing: 0.15em; margin: 0; line-height: 1.5; }

        /* ローディング表示 */
        #loader { text-align: center; padding: 100px; font-weight: 100; letter-spacing: 0.5em; font-size: 0.8rem; color: #ccc; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">BRAWL PICKER</a>
    <nav>
        <a href="tool.html">CALCULATOR</a>
        <a href="database.html" style="color: #000;">DATABASE</a>
        <a href="index.html#journal">JOURNAL</a>
    </nav>
</header>

<div class="container">
    <h2 class="category-title">Brawler Database</h2>
    <div id="loader">LOADING DATA...</div>
    <div class="brawler-grid" id="brawler-list">
        </div>
</div>

<script>
    async function fetchBrawlers() {
        try {
            // 公開されているブロスタのデータセットを利用
            const response = await fetch('https://api.brawltime.ninja/v1/brawlers');
            const data = await response.json();
            const brawlers = data.data; // キャラ情報の配列

            const listContainer = document.getElementById('brawler-list');
            const loader = document.getElementById('loader');
            
            // データを回してカードを作成
            Object.keys(brawlers).forEach(key => {
                const brawler = brawlers[key];
                
                const item = document.createElement('div');
                item.className = 'brawler-item';
                item.innerHTML = `
                    <div class="image-wrapper">
                        <img src="https://media.brawltime.ninja/brawlers/${key}/model.png" 
                             onerror="this.src='https://media.brawltime.ninja/brawlers/${key}/icon.png'" 
                             alt="${brawler.name}">
                    </div>
                    <div class="brawler-info">
                        <p class="brawler-name">${brawler.name}</p>
                        <p class="brawler-meta">
                            RARITY: ${brawler.rarity || 'COMMON'}<br>
                            CLASS: ${brawler.class || 'N/A'}
                        </p>
                    </div>
                `;
                listContainer.appendChild(item);
            });

            loader.style.display = 'none'; // ロード完了で消す
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('loader').innerText = 'ERROR LOADING DATA';
        }
    }

    // 実行
    fetchBrawlers();
</script>

</body>
</html>
